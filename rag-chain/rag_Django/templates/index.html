<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG 智能助手</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        .chat-container {
            height: calc(100vh - 120px);
        }
        .message-bubble {
            max-width: 85%;
        }
        .typing-indicator {
            display: inline-flex;
            align-items: center;
        }
        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #9ca3af;
            margin: 0 2px;
            animation: typing 1.4s infinite ease-in-out;
        }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        .scrollbar-thin::-webkit-scrollbar {
            width: 6px;
        }
        .scrollbar-thin::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 3px;
        }
        .scrollbar-thin::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        .scrollbar-thin::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div id="app"></div>

    <script type="text/javascript">
        const { createApp, ref, nextTick, onMounted } = Vue

        createApp({
            delimiters: ['[[', ']]'],
            setup() {
                const messages = ref([])
                const inputMessage = ref('')
                const isLoading = ref(false)
                const chatContainer = ref(null)
                const inputTextarea = ref(null)

                const examples = [
                    '犹豫期几天',
                    '什么是保险',
                    '理赔需要什么材料',
                    '等待期是多久'
                ]

                const scrollToBottom = () => {
                    nextTick(() => {
                        if (chatContainer.value) {
                            chatContainer.value.scrollTop = chatContainer.value.scrollHeight
                        }
                    })
                }

                const adjustTextareaHeight = () => {
                    if (inputTextarea.value) {
                        inputTextarea.value.style.height = 'auto'
                        inputTextarea.value.style.height = Math.min(inputTextarea.value.scrollHeight, 150) + 'px'
                    }
                }

                const getQueryClassName = (className) => {
                    const names = {
                        'keyword': '偏关键词',
                        'semantic': '偏语义',
                        'balanced': '平衡'
                    }
                    return names[className] || className
                }

                const getClassScoreClass = (className) => {
                    const classes = {
                        'keyword': 'bg-orange-100 text-orange-600',
                        'semantic': 'bg-green-100 text-green-600',
                        'balanced': 'bg-blue-100 text-blue-600'
                    }
                    return classes[className] || 'bg-gray-100 text-gray-600'
                }

                const clearChat = () => {
                    if (confirm('确定要清空对话吗？')) {
                        messages.value = []
                    }
                }

                const sendMessage = async (message) => {
                    if (!message.trim() || isLoading.value) return

                    const trimmedMessage = message.trim()
                    inputMessage.value = ''
                    
                    messages.value.push({
                        id: Date.now(),
                        content: trimmedMessage,
                        isUser: true,
                        isLoading: false
                    })
                    scrollToBottom()

                    const assistantMessageIndex = messages.value.push({
                        id: Date.now() + 1,
                        content: '',
                        isUser: false,
                        isLoading: true,
                        metadata: null,
                        sources: []
                    }) - 1

                    isLoading.value = true

                    try {
                        const eventSource = new EventSource(`/api/v1/chat/query/stream/?query=${encodeURIComponent(trimmedMessage)}`)

                        eventSource.addEventListener('metadata', (event) => {
                            try {
                                const metadata = JSON.parse(event.data)
                                messages.value[assistantMessageIndex].metadata = metadata
                                messages.value[assistantMessageIndex].sources = metadata.sources || []
                            } catch (e) {
                                console.error('解析 metadata 失败:', e)
                            }
                        })

                        eventSource.addEventListener('content', (event) => {
                            try {
                                const data = JSON.parse(event.data)
                                messages.value[assistantMessageIndex].content += data.chunk
                                messages.value[assistantMessageIndex].isLoading = false
                                scrollToBottom()
                            } catch (e) {
                                console.error('解析 content 失败:', e)
                            }
                        })

                        eventSource.addEventListener('finish', (event) => {
                            try {
                                const data = JSON.parse(event.data)
                                messages.value[assistantMessageIndex].isLoading = false
                                eventSource.close()
                                isLoading.value = false
                                scrollToBottom()
                            } catch (e) {
                                console.error('解析 finish 失败:', e)
                            }
                        })

                        eventSource.addEventListener('error', (error) => {
                            console.error('SSE 错误:', error)
                            messages.value[assistantMessageIndex].content = '连接服务器失败，请重试'
                            messages.value[assistantMessageIndex].isLoading = false
                            eventSource.close()
                            isLoading.value = false
                        })

                    } catch (error) {
                        console.warn('SSE 不可用，使用普通 API:', error)
                        await sendMessageFallback(trimmedMessage, assistantMessageIndex)
                    }
                }

                const sendMessageFallback = async (message, index) => {
                    try {
                        const response = await fetch('/api/v1/chat/query/', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ query: message })
                        })

                        const result = await response.json()

                        messages.value[index] = {
                            id: messages.value[index].id,
                            content: result.answer || '暂无答案',
                            isUser: false,
                            isLoading: false,
                            metadata: {
                                query_class: result.query_class,
                                class_scores: result.class_scores,
                                channel_weights: result.channel_weights
                            },
                            sources: result.sources || []
                        }
                    } catch (error) {
                        messages.value[index] = {
                            id: messages.value[index].id,
                            content: `查询失败: ${error.message}`,
                            isUser: false,
                            isLoading: false,
                            metadata: null,
                            sources: []
                        }
                    } finally {
                        isLoading.value = false
                        scrollToBottom()
                    }
                }

                onMounted(() => {
                    if (inputTextarea.value) {
                        inputTextarea.value.focus()
                    }
                })

                return {
                    messages,
                    inputMessage,
                    isLoading,
                    chatContainer,
                    inputTextarea,
                    examples,
                    sendMessage,
                    clearChat,
                    adjustTextareaHeight,
                    getQueryClassName,
                    getClassScoreClass
                }
            },
            template: `
                <div class="flex flex-col h-screen">
                    <header class="bg-white shadow-sm border-b border-gray-200">
                        <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
                            <div class="flex items-center space-x-3">
                                <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center">
                                    <i class="fa fa-comments text-white text-xl"></i>
                                </div>
                                <div>
                                    <h1 class="text-xl font-bold text-gray-800">RAG 智能助手</h1>
                                    <p class="text-sm text-gray-500">基于知识库的智能问答系统</p>
                                </div>
                            </div>
                            <div class="flex items-center space-x-4">
                                <span class="flex items-center space-x-2">
                                    <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                                    <span class="text-sm text-gray-600">在线</span>
                                </span>
                                <button @click="clearChat" class="text-gray-500 hover:text-gray-700 transition-colors">
                                    <i class="fa fa-trash-o text-lg"></i>
                                </button>
                            </div>
                        </div>
                    </header>

                    <main class="flex-1 overflow-hidden">
                        <div 
                            ref="chatContainer"
                            class="max-w-4xl mx-auto px-4 py-6 h-full overflow-y-auto scrollbar-thin"
                        >
                            <div v-if="messages.length === 0" class="flex flex-col items-center justify-center h-full text-center">
                                <div class="w-20 h-20 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full flex items-center justify-center mb-6">
                                    <i class="fa fa-robot text-white text-3xl"></i>
                                </div>
                                <h2 class="text-xl font-semibold text-gray-700 mb-2">欢迎使用 RAG 智能助手</h2>
                                <p class="text-gray-500 mb-6">我可以根据知识库为您解答问题</p>
                                <div class="flex flex-wrap justify-center gap-2">
                                    <button 
                                        v-for="example in examples" 
                                        :key="example"
                                        @click="sendMessage(example)"
                                        class="px-4 py-2 bg-white border border-gray-200 rounded-full text-sm text-gray-600 hover:bg-gray-50 hover:border-blue-300 transition-colors"
                                    >
                                        [[ example ]]
                                    </button>
                                </div>
                            </div>

                            <div v-else class="space-y-4">
                                <div 
                                    v-for="(message, index) in messages" 
                                    :key="index"
                                    class="flex"
                                    :class="message.isUser ? 'justify-end' : 'justify-start'"
                                >
                                    <div 
                                        class="message-bubble px-4 py-3 rounded-2xl"
                                        :class="message.isUser 
                                            ? 'bg-gradient-to-br from-blue-500 to-indigo-600 text-white rounded-br-md' 
                                            : 'bg-white text-gray-800 rounded-bl-md shadow-sm'"
                                    >
                                        <div v-if="message.isUser" class="text-sm">
                                            [[ message.content ]]
                                        </div>

                                        <div v-else>
                                            <div v-if="message.isLoading" class="typing-indicator">
                                                <span class="typing-dot"></span>
                                                <span class="typing-dot"></span>
                                                <span class="typing-dot"></span>
                                            </div>
                                            <div v-else>
                                                <div v-if="message.metadata" class="mb-2 flex flex-wrap gap-2">
                                                    <span 
                                                        class="px-2 py-0.5 text-xs rounded-full"
                                                        :class="getClassScoreClass(message.metadata.query_class)"
                                                    >
                                                        [[ getQueryClassName(message.metadata.query_class) ]]
                                                    </span>
                                                    <span class="px-2 py-0.5 text-xs bg-gray-100 rounded-full text-gray-600">
                                                        [[ message.sources.length ]] 篇文档
                                                    </span>
                                                </div>
                                                <div class="text-sm whitespace-pre-wrap">[[ message.content ]]</div>
                                                <div v-if="message.sources && message.sources.length > 0" class="mt-3 pt-3 border-t border-gray-100">
                                                    <p class="text-xs text-gray-500 mb-1">参考来源:</p>
                                                    <div class="flex flex-wrap gap-2">
                                                        <span 
                                                            v-for="(source, idx) in message.sources.slice(0, 3)" 
                                                            :key="idx"
                                                            class="text-xs text-blue-500 hover:text-blue-700 cursor-pointer"
                                                        >
                                                            [[ source ]]
                                                        </span>
                                                        <span v-if="message.sources.length > 3" class="text-xs text-gray-400">
                                                            +[[ message.sources.length - 3 ]] 更多
                                                        </span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    <footer class="bg-white border-t border-gray-200 px-4 py-4">
                        <div class="max-w-4xl mx-auto">
                            <div class="flex items-end space-x-3">
                                <div class="flex-1 relative">
                                    <textarea
                                        v-model="inputMessage"
                                        @keydown.ctrl.enter="sendMessage(inputMessage)"
                                        @keydown.enter.prevent="sendMessage(inputMessage)"
                                        placeholder="输入您的问题... (Ctrl+Enter 换行)"
                                        class="w-full px-4 py-3 border border-gray-200 rounded-xl resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                                        rows="1"
                                        ref="inputTextarea"
                                        @input="adjustTextareaHeight"
                                    ></textarea>
                                </div>
                                <button
                                    @click="sendMessage(inputMessage)"
                                    :disabled="!inputMessage.trim() || isLoading"
                                    class="px-6 py-3 bg-gradient-to-r from-blue-500 to-indigo-600 text-white rounded-xl hover:from-blue-600 hover:to-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all flex items-center space-x-2"
                                >
                                    <i class="fa fa-paper-plane" :class="{ 'fa-spin': isLoading }"></i>
                                    <span>发送</span>
                                </button>
                            </div>
                            <p class="text-xs text-gray-400 mt-2">按 Enter 发送，Ctrl+Enter 换行</p>
                        </div>
                    </footer>
                </div>
            `
        }).mount('#app')
    </script>
</body>
</html>
